version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gestion-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestion_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: gestion-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gestion_db
      JWT_SECRET: super-secreto-cambiar-en-produccion
      PORT: 8000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - postgres
    command: sh -c "npm run prisma:migrate deploy && npm start"

volumes:
  postgres_data:
